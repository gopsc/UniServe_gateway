[server]
host = 0.0.0.0
port = 9200

[directory]
root = ./public

[ssl]
enabled = true
cert_file = cert.pem
key_file = key.pem

[cors]
allowed_origins = http://localhost:5000,http://127.0.0.1:5000,http://localhost:3000

[security]
max_content_length_mb = 100
session_lifetime_hours = 24
rate_limit_enabled = false
rate_limit_default = 2000 per day;500 per hour;50 per minute;10 per second

[proxy]
enabled = true
allowed_targets = http://localhost:5001,ws://localhost:5002,http://localhost:5005,http://localhost:5004,http://localhost:5200,ws://localhost:8765
