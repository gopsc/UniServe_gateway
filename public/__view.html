<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
  <title>公司内部控制台</title>
  <style>
    /* ========== 全局重置与APP风格 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px 12px;
      color: #1d1d2c;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: #ffffff;
      border-radius: 36px;
      padding: 20px 20px 28px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.06), 0 8px 18px rgba(0, 0, 0, 0.04);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 680;
      letter-spacing: -0.3px;
      color: #0b1e33;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      padding-bottom: 6px;
    }

    /* 管理栏 */
    .admin-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      background: #f6f9fe;
      padding: 14px 20px;
      border-radius: 28px;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-badge {
      background: #e8edf9;
      padding: 8px 20px;
      border-radius: 34px;
      font-weight: 580;
      color: #1e3a6b;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
    }

    .visitor-badge {
      background: #f0fdf4;
      padding: 8px 20px;
      border-radius: 34px;
      font-weight: 580;
      color: #166534;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
    }

    .management-links {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mgmt-btn {
      background: white;
      border: 1px solid #dce3ef;
      padding: 10px 19px;
      border-radius: 34px;
      font-weight: 550;
      font-size: 0.88rem;
      color: #1f2a44;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      background: #ffffff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      cursor: pointer;
    }

    .mgmt-btn:hover {
      background: #f0f4ff;
      border-color: #9aa9c1;
    }

    .logout-btn {
      background: #ffe9e9;
      border: 1px solid #fcc;
      color: #b22234;
      padding: 10px 20px;
      border-radius: 34px;
      font-weight: 580;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.88rem;
      border: none;
    }

    .logout-btn:hover {
      background: #ffd4d4;
    }

    .home-btn {
      background: #e8f0fe;
      border: 1px solid #b3c9e8;
      color: #1a4c8a;
      padding: 10px 20px;
      border-radius: 34px;
      font-weight: 580;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.88rem;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .home-btn:hover {
      background: #d0e0fa;
      border-color: #8ab0e0;
    }

    /* 路径导航 */
    .path {
      background: #f4f6fc;
      padding: 12px 18px;
      border-radius: 22px;
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      word-break: break-word;
      color: #2c3e50;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .path a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 530;
    }
    .path a:hover {
      text-decoration: underline;
    }

    /* ========== APP风格方形卡片网格 ========== */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 18px;
      margin-top: 6px;
    }

    /* 方形卡片 */
    .app-card {
      background: #ffffff;
      border-radius: 28px;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0,0,0,0.02);
      border: 1px solid #f0f2f8;
      transition: all 0.2s ease;
      cursor: pointer;
      background: #fdfdfe;
      word-break: break-word;
      position: relative;
      overflow: hidden;
    }

    .app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
      border-color: #d1d9e6;
    }

    .app-card:active {
      transform: scale(0.96);
      background: #f2f6ff;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .app-card .card-icon {
      width: 60px;
      height: 60px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .app-card .card-icon img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: auto;
    }

    .app-card .card-icon .icon-emoji {
      font-size: 2.8rem;
      line-height: 1;
    }

    .app-card:hover .card-icon {
      transform: scale(1.1);
    }

    .app-card .card-name {
      font-weight: 590;
      font-size: 0.85rem;
      color: #121826;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 4px;
    }

    .app-card .card-meta {
      font-size: 0.7rem;
      color: #5f6b7f;
      margin-top: 4px;
      font-weight: 500;
    }

    /* 视频和音频卡片特殊样式 */
    .app-card.video-card {
      background: linear-gradient(135deg, #fef3f2 0%, #fff5f5 100%);
      border-color: #fecaca;
    }

    .app-card.video-card:hover {
      background: linear-gradient(135deg, #fee2e2 0%, #fef2f2 100%);
      border-color: #fca5a5;
    }

    .app-card.audio-card {
      background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 100%);
      border-color: #bfdbfe;
    }

    .app-card.audio-card:hover {
      background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%);
      border-color: #93c5fd;
    }

    /* 文件卡片特殊样式 */
    .app-card.file-card {
      background: #fafcff;
      border-color: #e8edf5;
    }

    .app-card.file-card:hover {
      background: #f0f6ff;
      border-color: #b8cbe0;
    }

    /* 返回上级卡片特殊样式 */
    .app-card.parent-dir {
      background: #f0f4fe;
      border: 1px dashed #b9c8f0;
    }

    .app-card.parent-dir .card-icon .icon-emoji {
      font-size: 2.5rem;
    }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px 20px;
      color: #7c7f8c;
      font-size: 1rem;
      background: #fafbfc;
      border-radius: 32px;
      font-weight: 500;
    }

    /* 隐藏文件计数提示 */
    .hidden-files-hint {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: -8px;
      padding: 4px;
    }

    /* 加载动画 */
    .loading-spinner {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 1rem;
    }

    .loading-spinner::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 登录提示卡片 */
    .login-prompt-card {
      grid-column: 1 / -1;
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 24px;
      color: white;
      font-weight: 500;
    }

    .login-prompt-card a {
      color: #ffd700;
      text-decoration: underline;
      font-weight: 600;
    }

    /* ========== 视频播放器模态框 ========== */
    .video-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .video-modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .video-modal-content {
      width: 100%;
      max-width: 1200px;
      max-height: 90vh;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .video-close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .video-close-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(1.1);
    }

    .video-player-wrapper {
      position: relative;
      width: 100%;
      background: #000;
    }

    .video-player-wrapper video {
      width: 100%;
      display: block;
      max-height: 80vh;
    }

    .video-info-bar {
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.8);
      color: #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      backdrop-filter: blur(20px);
    }

    .video-info-bar span {
      font-size: 14px;
    }

    .video-download-btn {
      padding: 6px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
      text-decoration: none;
    }

    .video-download-btn:hover {
      background: #0056b3;
      transform: scale(1.05);
    }

    /* 响应式调整 */
    @media (max-width: 600px) {
      .app-grid {
        grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
        gap: 14px;
      }
      .app-card .card-icon {
        width: 48px;
        height: 48px;
      }
      .app-card .card-icon .icon-emoji {
        font-size: 2.3rem;
      }
      .container {
        padding: 16px;
      }
      
      .video-modal-content {
        max-height: 100vh;
        border-radius: 0;
      }
      
      .video-info-bar {
        padding: 8px 12px;
        font-size: 12px;
      }
      
      .admin-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      
      .user-section {
        justify-content: center;
      }
      
      .management-links {
        justify-content: center;
      }
    }

    @media (min-width: 900px) {
      .app-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }

    .message {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 14px 24px;
      border-radius: 60px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.15);
      font-weight: 500;
      z-index: 2000;
      display: none;
      border-left: 5px solid #3b82f6;
      font-size: 0.9rem;
      max-width: 90vw;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .login-prompt {
      color: #4a5568;
      font-size: 0.9rem;
    }

    /* 图标加载失败时的回退样式 */
    .icon-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      border-radius: 12px;
      font-size: 1.5rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>
    <span>🏢</span> 公司内部控制台
  </h1>

  <!-- 管理栏 -->
  <div class="admin-bar">
    <div class="user-section" id="userInfoBlock">
      <span id="userDisplayArea">加载身份中...</span>
    </div>
    <div class="management-links">
      <button class="home-btn" id="homeButton" style="display: none;" title="回到我的文件夹">
        <span>🏠</span> 我的文件夹
      </button>
      <a href="/__login.html" class="mgmt-btn" id="loginLink">
        <span>🔐</span> 登录
      </a>
      <button class="mgmt-btn" id="settingsButton" onclick="openSettings()">
        <span>⚙️</span> 设置
      </button>
      <button class="logout-btn" id="logoutButton" style="display: none;">退出登录</button>
    </div>
  </div>

  <!-- 路径导航 -->
  <div class="path" id="pathNav">
    <a href="#" data-nav="/">🏠 根目录</a>
  </div>

  <!-- APP方形卡片网格容器 -->
  <div class="app-grid" id="appGridContainer">
    <div class="loading-spinner">正在加载文件...</div>
  </div>
</div>

<!-- 视频播放器模态框 -->
<div class="video-modal" id="videoModal">
  <div class="video-modal-content">
    <button class="video-close-btn" id="videoCloseBtn">✕</button>
    <div class="video-player-wrapper">
      <video id="videoPlayer" controls crossorigin="anonymous">
        您的浏览器不支持视频播放
      </video>
    </div>
    <div class="video-info-bar">
      <span id="videoFileName">视频文件</span>
      <span id="videoFileSize">大小: -</span>
      <span id="videoDuration">时长: -</span>
      <a href="#" id="videoDownloadBtn" class="video-download-btn" style="display:none;">下载视频</a>
    </div>
  </div>
</div>

<div id="liveMessage" class="message"></div>

<script>
  // 在新标签页中打开设置页面
  function openSettings() {
    window.open('/__settings.html', '_blank');
  }

  (function() {
    // ---------- 状态 ----------
    let currentPath = '';
    let isLoggedIn = false;
    let currentUser = null;
    let isAdmin = false;
    let userHomePath = '';  // 用户的默认家目录路径
    
    // 图标缓存：存储已检查过的文件名与图标路径的映射
    const iconCache = new Map();
    
    // 图标请求队列，避免重复请求
    const pendingIconChecks = new Map();

    const gridContainer = document.getElementById('appGridContainer');
    const pathNav = document.getElementById('pathNav');
    const userDisplayArea = document.getElementById('userDisplayArea');
    const logoutBtn = document.getElementById('logoutButton');
    const loginLink = document.getElementById('loginLink');
    const homeBtn = document.getElementById('homeButton');
    const messageDiv = document.getElementById('liveMessage');

    // 视频播放器相关元素
    const videoModal = document.getElementById('videoModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const videoCloseBtn = document.getElementById('videoCloseBtn');
    const videoFileName = document.getElementById('videoFileName');
    const videoFileSize = document.getElementById('videoFileSize');
    const videoDuration = document.getElementById('videoDuration');
    const videoDownloadBtn = document.getElementById('videoDownloadBtn');

    // Emoji回退图标（当自定义图标不可用时使用）
    const fallbackEmojis = {
      'dir': '📁',
      'file': '📄',
      'image': '🖼️',
      'document': '📘',
      'video': '🎬',
      'audio': '🎵',
      'archive': '📦',
      'code': '💻',
      'pdf': '📕',
      'default': '📄'
    };

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatFileSize(bytes) {
      if (bytes == null || bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    /**
     * 格式化视频时长
     */
    function formatDuration(seconds) {
      if (!seconds || isNaN(seconds)) return '-';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      
      if (h > 0) {
        return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    /**
     * 获取文件的扩展名分类（用于回退图标）
     */
    function getFileCategory(filename) {
      if (!filename) return 'default';
      const ext = filename.split('.').pop().toLowerCase();
      
      const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'bmp', 'ico'];
      const docExts = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'txt', 'md', 'csv'];
      const videoExts = ['mp4', 'avi', 'mov', 'wmv', 'flv', 'webm', 'mkv', 'm4v', '3gp', 'ogv'];
      const audioExts = ['mp3', 'wav', 'flac', 'aac', 'ogg', 'wma', 'm4a'];
      const archiveExts = ['zip', 'rar', '7z', 'tar', 'gz', 'bz2'];
      const codeExts = ['js', 'py', 'html', 'css', 'json', 'xml', 'java', 'cpp', 'c', 'php', 'rb', 'go', 'ts', 'jsx', 'tsx', 'vue'];
      
      if (ext === 'pdf') return 'pdf';
      if (imageExts.includes(ext)) return 'image';
      if (docExts.includes(ext)) return 'document';
      if (videoExts.includes(ext)) return 'video';
      if (audioExts.includes(ext)) return 'audio';
      if (archiveExts.includes(ext)) return 'archive';
      if (codeExts.includes(ext)) return 'code';
      
      return 'default';
    }

    /**
     * 检查文件是否为视频文件
     */
    function isVideoFile(filename) {
      if (!filename) return false;
      const ext = filename.split('.').pop().toLowerCase();
      const videoExts = ['mp4', 'avi', 'mov', 'wmv', 'flv', 'webm', 'mkv', 'm4v', '3gp', 'ogv', 'ts'];
      return videoExts.includes(ext);
    }

    /**
     * 检查文件是否为音频文件
     */
    function isAudioFile(filename) {
      if (!filename) return false;
      const ext = filename.split('.').pop().toLowerCase();
      const audioExts = ['mp3', 'wav', 'flac', 'aac', 'ogg', 'wma', 'm4a'];
      return audioExts.includes(ext);
    }

    /**
     * 获取回退的Emoji图标
     */
    function getFallbackEmoji(filename, isDir, itemType) {
      if (isDir) return fallbackEmojis['dir'];
      if (itemType === 'video') return '🎬';
      if (itemType === 'audio') return '🎵';
      const category = getFileCategory(filename);
      return fallbackEmojis[category] || fallbackEmojis['default'];
    }

    /**
     * 检查自定义图标是否存在
     * 图标路径格式: /__icons/文件名.ico
     */
    async function checkCustomIcon(filename) {
      if (iconCache.has(filename)) {
        return iconCache.get(filename);
      }
      
      if (pendingIconChecks.has(filename)) {
        return pendingIconChecks.get(filename);
      }
      
      const iconUrl = `/__icons/${encodeURIComponent(filename)}.ico`;
      
      const checkPromise = new Promise((resolve) => {
        const img = new Image();
        
        let resolved = false;
        
        const handleLoad = () => {
          if (resolved) return;
          resolved = true;
          clearTimeout(timeout);
          iconCache.set(filename, iconUrl);
          pendingIconChecks.delete(filename);
          resolve(iconUrl);
        };
        
        const handleError = () => {
          if (resolved) return;
          resolved = true;
          clearTimeout(timeout);
          iconCache.set(filename, null);
          pendingIconChecks.delete(filename);
          resolve(null);
        };
        
        const timeout = setTimeout(() => {
          if (resolved) return;
          resolved = true;
          iconCache.set(filename, null);
          pendingIconChecks.delete(filename);
          resolve(null);
        }, 3000);
        
        img.onload = handleLoad;
        img.onerror = handleError;
        img.src = iconUrl;
      });
      
      pendingIconChecks.set(filename, checkPromise);
      return checkPromise;
    }

    /**
     * 预加载一批文件的图标
     */
    async function preloadIcons(items) {
      const promises = items.map(item => {
        if (item.type === 'dir') return Promise.resolve(null);
        return checkCustomIcon(item.name);
      });
      
      await Promise.allSettled(promises);
    }

    function showMessage(type, text) {
      messageDiv.className = 'message';
      messageDiv.textContent = text;
      messageDiv.style.display = 'block';
      messageDiv.style.borderLeftColor = type === 'error' ? '#ef4444' : (type === 'success' ? '#10b981' : '#3b82f6');
      clearTimeout(messageDiv._timeout);
      messageDiv._timeout = setTimeout(() => { 
        messageDiv.style.display = 'none'; 
      }, 3000);
    }

    /**
     * 过滤掉以双下划线 __ 开头的文件/目录
     */
    function filterHiddenFiles(files) {
      if (!Array.isArray(files)) return [];
      return files.filter(file => {
        if (!file || !file.name) return false;
        return !file.name.startsWith('__');
      });
    }

    /**
     * 更新路径导航
     */
    function renderPathNav(path) {
      if (!path || path === '') {
        pathNav.innerHTML = '<a href="#" data-nav="/">🏠 根目录</a>';
        return;
      }
      
      path = path.replace(/\\/g, '/').replace(/\/+/g, '/');
      const parts = path.split('/').filter(p => p !== '');
      
      let html = '<a href="#" data-nav="/">🏠 根目录</a>';
      let accumulated = '';
      parts.forEach((part, idx) => {
        accumulated += '/' + part;
        html += ` / <a href="#" data-nav="${accumulated}">${escapeHtml(part)}</a>`;
      });
      pathNav.innerHTML = html;

      pathNav.querySelectorAll('a[data-nav]').forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const navPath = this.getAttribute('data-nav');
          const cleanPath = navPath === '/' ? '' : navPath.replace(/^\//, '');
          navigateToPath(cleanPath);
        });
      });
    }

    /**
     * 渲染图标HTML
     */
    function renderIconHTML(filename, isDir, itemType) {
      if (isDir) {
        return `<span class="icon-emoji">📁</span>`;
      }
      
      const customIcon = iconCache.get(filename);
      
      if (customIcon) {
        return `<img src="${escapeHtml(customIcon)}" alt="${escapeHtml(filename)}" onerror="this.parentElement.innerHTML='<span class=\\'icon-emoji\\'>${getFallbackEmoji(filename, false, itemType)}</span>'">`;
      } else if (iconCache.has(filename) && iconCache.get(filename) === null) {
        const emoji = getFallbackEmoji(filename, false, itemType);
        return `<span class="icon-emoji">${emoji}</span>`;
      } else {
        const emoji = getFallbackEmoji(filename, false, itemType);
        return `<span class="icon-emoji icon-placeholder" data-filename="${escapeHtml(filename)}">${emoji}</span>`;
      }
    }

    /**
     * 异步更新占位图标
     */
    async function updatePlaceholderIcons() {
      const placeholders = document.querySelectorAll('.icon-placeholder');
      
      for (const placeholder of placeholders) {
        const filename = placeholder.getAttribute('data-filename');
        if (!filename) continue;
        
        const customIcon = await checkCustomIcon(filename);
        
        if (customIcon) {
          placeholder.innerHTML = `<img src="${escapeHtml(customIcon)}" alt="${escapeHtml(filename)}" onerror="this.innerHTML='<span class=\\'icon-emoji\\'>${getFallbackEmoji(filename, false)}</span>'">`;
          placeholder.classList.remove('icon-placeholder');
          placeholder.removeAttribute('data-filename');
        } else {
          placeholder.classList.remove('icon-placeholder');
          placeholder.removeAttribute('data-filename');
        }
      }
    }

    /**
     * 渲染方形卡片网格
     */
    function renderAppGrid(items, parentPath) {
      const visibleItems = filterHiddenFiles(items);
      const hiddenCount = items ? items.length - visibleItems.length : 0;

      if (!visibleItems || visibleItems.length === 0) {
        let html = '';
        if (currentPath && currentPath !== '') {
          const parent = parentPath || '';
          html += `
            <div class="app-card parent-dir" data-navigate="${escapeHtml(parent)}">
              <div class="card-icon"><span class="icon-emoji">↩️</span></div>
              <div class="card-name">返回上级</div>
              <div class="card-meta">文件夹</div>
            </div>
          `;
        }
        html += `<div class="empty-state">📭 此文件夹为空</div>`;
        if (hiddenCount > 0) {
          html += `<div class="hidden-files-hint">🔒 已隐藏 ${hiddenCount} 个系统项目</div>`;
        }
        gridContainer.innerHTML = html;
        bindCardNavigation();
        return;
      }

      let html = '';

      if (currentPath && currentPath !== '') {
        const parent = parentPath || '';
        html += `
          <div class="app-card parent-dir" data-navigate="${escapeHtml(parent)}">
            <div class="card-icon"><span class="icon-emoji">↩️</span></div>
            <div class="card-name">返回上级</div>
            <div class="card-meta">文件夹</div>
          </div>
        `;
      }

      visibleItems.forEach(item => {
        const safeName = escapeHtml(item.name);
        const isDir = item.type === 'dir';
        const itemType = item.type || (isDir ? 'dir' : 'file');
        const iconHTML = renderIconHTML(item.name, isDir, itemType);
        
        let metaText = '文件';
        if (isDir) {
          metaText = '文件夹';
        } else if (itemType === 'video') {
          metaText = '🎬 视频 · ' + formatFileSize(item.size);
        } else if (itemType === 'audio') {
          metaText = '🎵 音频 · ' + formatFileSize(item.size);
        } else {
          metaText = formatFileSize(item.size) || '文件';
        }
        
        const itemPath = item.path || item.name;

        if (isDir) {
          html += `
            <div class="app-card" data-navigate="${escapeHtml(itemPath)}" title="打开文件夹: ${safeName}">
              <div class="card-icon">${iconHTML}</div>
              <div class="card-name">${safeName}</div>
              <div class="card-meta">${metaText}</div>
            </div>
          `;
        } else if (itemType === 'video') {
          // 视频文件卡片
          html += `
            <div class="app-card video-card" data-video="${escapeHtml(itemPath)}" title="播放视频: ${safeName}">
              <div class="card-icon">${iconHTML}</div>
              <div class="card-name">${safeName}</div>
              <div class="card-meta">${metaText}</div>
            </div>
          `;
        } else if (itemType === 'audio') {
          // 音频文件卡片
          html += `
            <div class="app-card audio-card" data-video="${escapeHtml(itemPath)}" title="播放音频: ${safeName}">
              <div class="card-icon">${iconHTML}</div>
              <div class="card-name">${safeName}</div>
              <div class="card-meta">${metaText}</div>
            </div>
          `;
        } else {
          html += `
            <div class="app-card file-card" data-file="${escapeHtml(itemPath)}" title="打开文件: ${safeName}">
              <div class="card-icon">${iconHTML}</div>
              <div class="card-name">${safeName}</div>
              <div class="card-meta">${metaText}</div>
            </div>
          `;
        }
      });

      if (hiddenCount > 0) {
        html += `<div class="hidden-files-hint">🔒 已隐藏 ${hiddenCount} 个系统项目</div>`;
      }

      gridContainer.innerHTML = html;
      bindCardNavigation();
      bindFileOpen();
      bindVideoPlay();
      
      updatePlaceholderIcons();
    }

    /**
     * 绑定目录卡片点击导航
     */
    function bindCardNavigation() {
      document.querySelectorAll('.app-card[data-navigate]').forEach(card => {
        card.addEventListener('click', function(e) {
          const targetPath = this.getAttribute('data-navigate');
          if (targetPath !== null && targetPath !== undefined) {
            navigateToPath(targetPath);
          }
        });
      });
    }

    /**
     * 绑定文件卡片点击打开
     */
    function bindFileOpen() {
      document.querySelectorAll('.app-card[data-file]').forEach(card => {
        card.addEventListener('click', function(e) {
          const filePath = this.getAttribute('data-file');
          if (filePath) {
            openFile(filePath);
          }
        });
      });
    }

    /**
     * 绑定视频/音频卡片点击播放
     */
    function bindVideoPlay() {
      document.querySelectorAll('.app-card[data-video]').forEach(card => {
        card.addEventListener('click', function(e) {
          const filePath = this.getAttribute('data-video');
          if (filePath) {
            playMedia(filePath, this);
          }
        });
      });
    }

    /**
     * 播放视频或音频文件
     */
    function playMedia(filePath, cardElement) {
      const fileName = filePath.split('/').pop();
      const streamUrl = '/video/' + filePath;
      
      // 更新播放器信息
      videoFileName.textContent = fileName;
      videoFileSize.textContent = '加载中...';
      videoDuration.textContent = '时长: -';
      
      // 设置视频源
      videoPlayer.innerHTML = ''; // 清空现有源
      
      const source = document.createElement('source');
      source.src = streamUrl;
      source.type = getMimeType(fileName);
      videoPlayer.appendChild(source);
      
      // 显示模态框
      videoModal.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      // 加载视频
      videoPlayer.load();
      
      // 获取文件信息
      fetchVideoInfo(filePath);
      
      // 设置下载链接
      if (isLoggedIn) {
        videoDownloadBtn.href = '/' + filePath + '?download=true';
        videoDownloadBtn.style.display = 'inline-block';
      } else {
        videoDownloadBtn.style.display = 'none';
      }
    }

    /**
     * 获取视频文件信息
     */
    async function fetchVideoInfo(filePath) {
      try {
        const response = await fetch('/api/video/info/' + filePath, {
          credentials: 'same-origin'
        });
        
        if (response.ok) {
          const data = await response.json();
          if (data.success) {
            videoFileName.textContent = data.name;
            videoFileSize.textContent = '大小: ' + (data.size_mb || formatFileSize(data.size));
          }
        }
      } catch (error) {
        console.error('获取视频信息失败:', error);
      }
    }

    /**
     * 获取MIME类型
     */
    function getMimeType(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const mimeTypes = {
        'mp4': 'video/mp4',
        'webm': 'video/webm',
        'ogg': 'video/ogg',
        'ogv': 'video/ogg',
        'avi': 'video/x-msvideo',
        'mov': 'video/quicktime',
        'flv': 'video/x-flv',
        'mkv': 'video/x-matroska',
        'wmv': 'video/x-ms-wmv',
        'm4v': 'video/x-m4v',
        'mp3': 'audio/mpeg',
        'wav': 'audio/wav',
        'flac': 'audio/flac',
        'aac': 'audio/aac',
        'm4a': 'audio/mp4'
      };
      return mimeTypes[ext] || 'video/mp4';
    }

    /**
     * 关闭视频播放器
     */
    function closeVideoPlayer() {
      videoPlayer.pause();
      videoPlayer.innerHTML = '';
      videoModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    // 关闭视频播放器事件
    videoCloseBtn.addEventListener('click', closeVideoPlayer);
    
    videoModal.addEventListener('click', function(e) {
      if (e.target === videoModal) {
        closeVideoPlayer();
      }
    });

    // 键盘快捷键关闭视频
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && videoModal.classList.contains('active')) {
        closeVideoPlayer();
      }
    });

    // 视频加载完成事件
    videoPlayer.addEventListener('loadedmetadata', function() {
      const duration = videoPlayer.duration;
      videoDuration.textContent = '时长: ' + formatDuration(duration);
    });

    // 视频错误处理
    videoPlayer.addEventListener('error', function(e) {
      const error = videoPlayer.error;
      let message = '视频加载失败';
      
      switch(error?.code) {
        case 1:
          message = '视频加载中止';
          break;
        case 2:
          message = '网络错误，无法加载视频';
          break;
        case 3:
          message = '视频解码失败';
          break;
        case 4:
          message = '视频格式不支持';
          break;
      }
      
      showMessage('error', message);
      videoDuration.textContent = '播放失败';
    });

    /**
     * 打开文件（在新标签页中）
     */
    function openFile(filePath) {
      const fullPath = filePath.startsWith('/') ? filePath : '/' + filePath;
      window.open(fullPath, '_blank');
    }

    /**
     * 导航到指定路径
     */
    function navigateToPath(path) {
      if (path === '/' || path === '') {
        currentPath = '';
      } else {
        currentPath = path.replace(/^\/+/, '');
      }
      
      renderPathNav(currentPath);
      loadDirectory();
      
      const urlPath = currentPath ? '/' + currentPath : '/';
      if (window.location.pathname !== urlPath) {
        window.history.pushState({}, '', urlPath);
      }
      
      // 更新"我的文件夹"按钮的显示状态
      updateHomeButton();
    }

    /**
     * 更新"我的文件夹"按钮的显示状态
     */
    function updateHomeButton() {
      if (isLoggedIn && !isAdmin && userHomePath) {
        // 普通用户：显示"我的文件夹"按钮，但如果在自己的家目录中则隐藏
        const isInHome = currentPath === userHomePath || 
                         currentPath.startsWith(userHomePath + '/');
        if (isInHome) {
          homeBtn.style.display = 'none';
        } else {
          homeBtn.style.display = 'inline-flex';
        }
      } else if (isLoggedIn && isAdmin) {
        // 管理员：隐藏"我的文件夹"按钮
        homeBtn.style.display = 'none';
      } else {
        // 未登录：隐藏按钮
        homeBtn.style.display = 'none';
      }
    }

    /**
     * 回到用户的文件夹
     */
    function goToHome() {
      if (userHomePath) {
        navigateToPath(userHomePath);
        showMessage('success', '已回到你的文件夹');
      } else {
        showMessage('error', '无法确定你的文件夹位置');
      }
    }

    /**
     * 加载当前目录内容
     */
    async function loadDirectory() {
      gridContainer.innerHTML = '<div class="loading-spinner">正在加载...</div>';
      
      try {
        let apiUrl = '/api/filelist';
        if (currentPath) {
          apiUrl += '?path=' + encodeURIComponent(currentPath);
        }
        
        const response = await fetch(apiUrl, {
          credentials: 'same-origin',
          headers: { 'Accept': 'application/json' }
        });
        
        if (!response.ok) {
          if (response.status === 401) {
            const data = await response.json();
            if (data.require_login) {
              gridContainer.innerHTML = `
                <div class="login-prompt-card">
                  <div style="font-size: 2rem; margin-bottom: 10px;">🔒</div>
                  <div style="font-size: 1.1rem; margin-bottom: 8px;">此目录需要登录后才能访问</div>
                  <div style="font-size: 0.9rem; opacity: 0.9;">
                    请<a href="/__login.html">登录</a>后查看用户目录
                  </div>
                </div>
              `;
            } else {
              showMessage('error', '请先登录');
              gridContainer.innerHTML = '<div class="empty-state">🔒 需要登录才能访问此内容</div>';
            }
            updateHomeButton();
            return;
          }
          
          if (response.status === 403) {
            const data = await response.json();
            if (data.redirect) {
              // 需要重定向到用户的文件夹
              showMessage('error', data.error || '访问被拒绝，正在跳转到您的文件夹...');
              setTimeout(() => {
                navigateToPath(data.redirect);
              }, 1000);
              return;
            }
            showMessage('error', data.error || '访问被拒绝');
            gridContainer.innerHTML = '<div class="empty-state">⛔ 访问被拒绝</div>';
            updateHomeButton();
            return;
          }
          
          throw new Error('服务器响应错误: ' + response.status);
        }
        
        const data = await response.json();
        
        if (data.success) {
          const items = data.items || [];
          const parentPath = data.parent_path || '';
          
          await preloadIcons(items);
          
          renderAppGrid(items, parentPath);
        } else {
          if (data.redirect) {
            // 需要重定向
            showMessage('error', data.error || '正在跳转...');
            setTimeout(() => {
              navigateToPath(data.redirect);
            }, 1000);
            return;
          }
          showMessage('error', data.error || '无法加载文件列表');
          gridContainer.innerHTML = '<div class="empty-state">⚠️ 加载失败</div>';
        }
      } catch (err) {
        console.error('加载目录失败:', err);
        showMessage('error', '网络错误，无法获取文件列表');
        gridContainer.innerHTML = '<div class="empty-state">⚠️ 连接错误，请检查网络</div>';
      }
      
      updateHomeButton();
    }

    /**
     * 检查登录状态
     */
    async function checkAuth() {
      try {
        const res = await fetch('/api/check-auth', { 
          credentials: 'same-origin',
          headers: { 'Accept': 'application/json' }
        });
        const data = await res.json();
        isLoggedIn = data.authenticated || false;
        currentUser = data.user || null;
        isAdmin = data.is_admin || false;
        
        if (isLoggedIn && data.default_path) {
          userHomePath = data.default_path;
          if (!currentPath || currentPath === '') {
            currentPath = userHomePath;
          }
        } else {
          userHomePath = '';
        }
      } catch (e) {
        console.error('检查认证失败:', e);
        isLoggedIn = false;
        currentUser = null;
        isAdmin = false;
        userHomePath = '';
      }
      updateUserUI();
      updateHomeButton();
    }

    /**
     * 更新用户界面
     */
    function updateUserUI() {
      if (isLoggedIn && currentUser) {
        const roleBadge = isAdmin ? '(管理员)' : '(用户)';
        userDisplayArea.innerHTML = `
          <div class="user-badge">
            👤 ${escapeHtml(currentUser.username)} 
            <span style="font-size:0.75rem; opacity:0.8;">${roleBadge}</span>
          </div>
        `;
        logoutBtn.style.display = 'inline-block';
        if (loginLink) {
          loginLink.style.display = 'none';
        }
      } else {
        userDisplayArea.innerHTML = `
          <div class="visitor-badge">
            🔓 访客模式 · 请先登录
          </div>
        `;
        logoutBtn.style.display = 'none';
        if (loginLink) {
          loginLink.style.display = 'inline-flex';
        }
      }
    }

    /**
     * 退出登录
     */
    async function performLogout() {
      try {
        const response = await fetch('/api/logout', { 
          method: 'POST', 
          credentials: 'same-origin' 
        });
        
        if (response.ok) {
          isLoggedIn = false;
          currentUser = null;
          isAdmin = false;
          userHomePath = '';
          currentPath = '';
          updateUserUI();
          renderPathNav('');
          showMessage('success', '已成功退出登录');
          updateHomeButton();
          await loadDirectory();
        } else {
          showMessage('error', '退出失败');
        }
      } catch (e) {
        console.error('退出登录失败:', e);
        showMessage('error', '退出失败，请重试');
      }
    }

    /**
     * 监听浏览器后退/前进
     */
    window.addEventListener('popstate', function() {
      const urlPath = window.location.pathname || '/';
      currentPath = urlPath === '/' ? '' : urlPath.replace(/^\//, '');
      renderPathNav(currentPath);
      loadDirectory();
      updateHomeButton();
    });

    // 绑定退出按钮
    if (logoutBtn) {
      logoutBtn.addEventListener('click', performLogout);
    }

    // 绑定"我的文件夹"按钮
    if (homeBtn) {
      homeBtn.addEventListener('click', goToHome);
    }

    /**
     * 初始化
     */
    async function init() {
      const urlPath = window.location.pathname || '/';
      currentPath = urlPath === '/' ? '' : urlPath.replace(/^\//, '');
      
      await checkAuth();
      
      renderPathNav(currentPath);
      
      await loadDirectory();
    }

    document.addEventListener('DOMContentLoaded', init);

  })();
</script>
</body>
</html>
